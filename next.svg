import { type ClassValue, clsx } from "clsx";
import { twMerge } from "tailwind-merge";
import { EVENTS } from "./training-data";

export function cn(...inputs: ClassValue[]) {
  return twMerge(clsx(inputs));
}

export function daysUntil(date: Date): number {
  const now = new Date();
  now.setHours(0, 0, 0, 0);
  const target = new Date(date);
  target.setHours(0, 0, 0, 0);
  return Math.max(0, Math.ceil((target.getTime() - now.getTime()) / (1000 * 60 * 60 * 24)));
}

export function getDaysToEvents() {
  return EVENTS.map((e) => ({ ...e, days: daysUntil(e.date) }));
}

export function getCurrentWeekNumber(): number {
  const planStart = new Date("2026-04-10");
  const today = new Date();
  today.setHours(0, 0, 0, 0);
  const diff = today.getTime() - planStart.getTime();
  const week = Math.floor(diff / (7 * 24 * 60 * 60 * 1000)) + 1;
  return Math.max(1, Math.min(week, 30));
}

export function formatPace(secondsPerKm: number): string {
  const min = Math.floor(secondsPerKm / 60);
  const sec = secondsPerKm % 60;
  return `${min}:${sec.toString().padStart(2, "0")}/km`;
}
